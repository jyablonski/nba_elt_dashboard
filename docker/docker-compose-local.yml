services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=nba_dashboard_user
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ${PWD}/docker/postgres_bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql
    networks:
      - dashboard_network

  dash_app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev} # Use 'dev' as default for local
    image: nba_elt_dashboard_local
    environment:
      - IP=postgres
      - RDS_USER=nba_dashboard_user
      - RDS_PW=postgres
      - RDS_DB=postgres
      - RDS_SCHEMA=gold
      - ENV_TYPE=docker_dev
      # Pick up bind-mounted `src/` / `static/` edits without manual `docker compose restart dash_app`
      - DASH_RELOAD=1
      - DATA_REFRESH_TOKEN=xbSSkcfOnoiBcoHtiuatSPrKq9Np3X3c
    restart: on-failure
    ports:
      - 9000:9000
    depends_on:
      - postgres
    networks:
      - dashboard_network
    links:
      - postgres:postgres
    volumes:
      - ${PWD}/src/:/home/appuser/src
      - ${PWD}/static/:/home/appuser/static
      - ${PWD}/config.yaml:/home/appuser/config.yaml

networks:
  dashboard_network:
